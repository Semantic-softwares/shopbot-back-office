<div class="space-y-4">
  <h3 class="text-lg font-semibold text-gray-900">Leases</h3>

  @if (leaseResource.isLoading()) {
    <div class="flex items-center justify-center py-8">
      <mat-spinner diameter="30"></mat-spinner>
    </div>
  } @else if (leases().length === 0) {
    <app-no-record
      icon="description"
      title="No Leases"
      message="No leases found for this unit."
    ></app-no-record>
  } @else {
    <div class="overflow-auto">
      <table mat-table [dataSource]="leases()" class="w-full">
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <mat-chip [ngClass]="getLeaseStatusClass(row.status)" class="!text-xs">
              {{ row.status | titlecase }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="leaseNumber">
          <th mat-header-cell *matHeaderCellDef>Lease</th>
          <td mat-cell *matCellDef="let row">
            <button mat-button (click)="goToLeaseDetail(row._id)" class="!px-0">
              {{ row.leaseNumber }}
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="tenant">
          <th mat-header-cell *matHeaderCellDef>Tenant</th>
          <td mat-cell *matCellDef="let row">{{ getTenantName(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="duration">
          <th mat-header-cell *matHeaderCellDef>Duration</th>
          <td mat-cell *matCellDef="let row">
            <span class="text-sm text-gray-600">{{ getLeaseDuration(row) }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="rent">
          <th mat-header-cell *matHeaderCellDef>Rent</th>
          <td mat-cell *matCellDef="let row">
            <span class="font-medium">{{ getLeaseRent(row) }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button (click)="goToLeaseDetail(row._id)" aria-label="View lease">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }
</div>

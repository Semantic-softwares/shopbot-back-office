@if (lease(); as lease) {
  <mat-card appearance="outlined">
    <mat-card-content class="p-4!">
      <div class="text-xs font-semibold text-gray-500 mb-2">AGREEMENTS & NOTICES</div>
      @if (lease.notes) {
        <p class="text-sm text-gray-700 leading-relaxed">{{ lease.notes }}</p>
      } @else {
        <app-no-record
          icon="description"
          title="No Agreements or Notices"
          message="No agreements or notices have been recorded for this lease yet."
        ></app-no-record>
      }
    </mat-card-content>
  </mat-card>
}

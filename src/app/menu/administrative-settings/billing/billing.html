<div class="w-full min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <!-- Loading State -->
    @if (isLoading()) {
      <div class="flex justify-center py-16">
        <mat-spinner [diameter]="50"></mat-spinner>
      </div>
    }

    @if (!isLoading() && data()) {
      <!-- Billing Information Component -->
      <app-billing-information [data]="data()!" />

      <!-- Current Plan Component -->
      @if (data()!.subscription.status !== 'EXPIRED' && data()!.subscription.status !== 'CANCELLED') {
        <app-current-plan [data]="data()!" (subscriptionChanged)="loadSubscription()"></app-current-plan>
      }

      <!-- Invoices Component -->
      <app-invoices></app-invoices>
    }
  </div>
</div>

<mat-form-field appearance="outline" class="w-full">
  <mat-label>{{ label }}</mat-label>
  <input
    matInput
    [formControl]="control"
    [matAutocomplete]="managerAuto"
    (input)="onManagerInput($event)"
    placeholder="Search staff by name or email"
    aria-label="Search for a staff member">
  @if (control.value) {
    <button matSuffix mat-icon-button type="button" (click)="clearManager()" aria-label="Clear selected manager">
      <mat-icon>close</mat-icon>
    </button>
  }
  <mat-autocomplete
    #managerAuto="matAutocomplete"
    [displayWith]="displayMerchantName"
    (optionSelected)="onManagerSelected($event)">
    @for (merchant of filteredMerchants(); track merchant._id) {
      <mat-option [value]="merchant._id">
        <div class="flex items-center gap-2">
          <mat-icon class="text-gray-400 !text-lg">person</mat-icon>
          <div>
            <div class="text-sm font-medium">{{ merchant.name }}</div>
            <div class="text-xs text-gray-400">{{ merchant.email }}</div>
          </div>
        </div>
      </mat-option>
    }
  </mat-autocomplete>
  @if (control.invalid && control.touched) {
    <mat-error>Please select a staff member</mat-error>
  }
</mat-form-field>

<h2 mat-dialog-title>Create Invoice Category</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="grid grid-cols-1 gap-3 pt-1">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. Cleaning Fee" />
    </mat-form-field>

    <div class="grid grid-cols-1 gap-3 md:grid-cols-[1fr_auto] md:items-start">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Code</mat-label>
        <input
          matInput
          formControlName="code"
          placeholder="e.g. CLEANING_FEE"
          (blur)="normalizeCode()"
        />
      </mat-form-field>
      <button mat-stroked-button type="button" (click)="useNameAsCode()">Use Name</button>
    </div>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Financial Side</mat-label>
      <mat-select formControlName="side">
        @for (side of sideOptions; track side) {
          <mat-option [value]="side">{{ side }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Description (optional)</mat-label>
      <textarea matInput rows="3" formControlName="description"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button mat-flat-button type="button" [disabled]="form.invalid || isSaving()" (click)="save()">
    @if (isSaving()) {
      <mat-spinner diameter="16" class="mr-2"></mat-spinner>
    }
    Create
  </button>
</mat-dialog-actions>
